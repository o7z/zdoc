<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- Circuit patterns -->
  <g stroke="#4f46e5" stroke-width="1" opacity="0.3">
    <line x1="50" y1="100" x2="150" y2="100"/>
    <line x1="100" y1="50" x2="100" y2="150"/>
    <circle cx="100" cy="100" r="5" fill="#4f46e5"/>
    
    <line x1="362" y1="412" x2="462" y2="412"/>
    <line x1="412" y1="362" x2="412" y2="462"/>
    <circle cx="412" cy="412" r="5" fill="#818cf8"/>
    
    <line x1="50" y1="412" x2="150" y2="412"/>
    <line x1="100" y1="362" x2="100" y2="462"/>
    <circle cx="100" cy="412" r="5" fill="#4f46e5"/>
    
    <line x1="362" y1="100" x2="462" y2="100"/>
    <line x1="412" y1="50" x2="412" y2="150"/>
    <circle cx="412" cy="412" r="5" fill="#818cf8"/>
  </g>
  
  <!-- Rotated Z -->
  <g transform="translate(256, 256) rotate(45)">
    <text x="0" y="0" 
          font-family="Arial, sans-serif" 
          font-size="280" 
          font-weight="bold"
          fill="url(#cyberGradient)"
          text-anchor="middle"
          dominant-baseline="central"
          filter="url(#glow)"
          stroke="#818cf8"
          stroke-width="2">Z</text>
  </g>
  
  <!-- Corner accents -->
  <rect x="20" y="20" width="40" height="3" fill="#818cf8" opacity="0.6"/>
  <rect x="20" y="20" width="3" height="40" fill="#818cf8" opacity="0.6"/>
  <rect x="452" y="20" width="40" height="3" fill="#818cf8" opacity="0.6"/>
  <rect x="489" y="20" width="3" height="40" fill="#818cf8" opacity="0.6"/>
  <rect x="20" y="452" width="40" height="3" fill="#818cf8" opacity="0.6"/>
  <rect x="20" y="489" width="3" height="40" fill="#818cf8" opacity="0.6"/>
  <rect x="452" y="452" width="40" height="3" fill="#818cf8" opacity="0.6"/>
  <rect x="489" y="452" width="3" height="40" fill="#818cf8" opacity="0.6"/>
</svg>
