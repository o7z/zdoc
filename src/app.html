<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Z</text></svg>" />
		<script>
			(function(){
				try{
					var s=localStorage.getItem('docs-dark');
					if(s==='1'||(!s&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
						document.documentElement.classList.add('dark');
					}
				}catch(e){}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
